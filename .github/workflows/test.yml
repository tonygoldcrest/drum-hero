name: Test

on:
  push:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'electron.vite.config.ts'
      - 'scripts/**'
      - 'assets/**'
      - 'src/main/**'
      - 'src/preload/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'yarn.lock'
      - 'electron.vite.config.ts'
      - 'scripts/**'
      - 'assets/**'
      - 'src/main/**'
      - 'src/preload/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-latest
            package_cmd: yarn package
          - os: windows-latest
            package_cmd: yarn package:win

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Build and package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ${{ matrix.package_cmd }}
